<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Match RTD patterns like /en/latest/ or /projects/myproject/en/stable/
      var path = window.location.pathname.replace(/^\/(?:projects\/[^/]+\/)?[a-z]{2}(?:[-_][a-z]+)?\/[^/]+/i, "");
      if (!path.startsWith("/")) path = "/" + path;
      var query = window.location.search;
      var hash = window.location.hash;
      window.location.replace("https://quillmark.dev" + path + query + hash);
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://quillmark.dev">quillmark.dev</a>...</p>
  </body>
</html>
